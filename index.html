    { question: "Who plays Eleven in 'Stranger Things'?", options: ["A) Sadie Sink", "B) Natalia Dyer", "C) Millie Bobby Brown", "D) Maya Hawke"], answer: "C) Millie Bobby Brown", explanation: "Millie Bobby Brown plays Eleven, a girl with telekinetic powers, in Stranger Things.", year: 2016 },
    { question: "What Coen Brothers film is set in 1991 Minnesota and features a famous wood chipper scene?", options: ["A) No Country for Old Men", "B) Blood Simple", "C) Fargo", "D) The Big Lebowski"], answer: "C) Fargo", explanation: "Fargo (1996) won Academy Awards for Best Director and Best Original Screenplay.", year: 1996 },
  ],
};

function getQuestion(category, yearFrom, yearTo) {
  const catLabel = PRESET_CATEGORIES.find(c => c.id === category)?.label || category;
  const questions = QUESTION_BANK[category];
  if (!questions || questions.length === 0) {
    return {
      question: `What is a fun fact about ${catLabel}?`,
      options: ["A) It's amazing", "B) It's incredible", "C) It's wonderful", "D) All of the above"],
      answer: "D) All of the above",
      explanation: "Well, they're all true!",
      category,
      categoryLabel: catLabel,
    };
  }
  const filtered = questions.filter(q => q.year >= yearFrom && q.year <= yearTo);
  const pool = filtered.length > 0 ? filtered : questions;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  return { ...pick, category, categoryLabel: catLabel };
}

function SetupScreen({ onStart }) {
  const [selectedCategories, setSelectedCategories] = useState(["history", "science", "pop-culture", "sports"]);
  const [numPlayers, setNumPlayers] = useState(2);
  const [playerNames, setPlayerNames] = useState(["Player 1", "Player 2", "", ""]);
  const [questionsPerTurn, setQuestionsPerTurn] = useState(1);
  const [yearFrom, setYearFrom] = useState(1970);
  const [yearTo, setYearTo] = useState(2024);

  const toggleCategory = (id) => {
    setSelectedCategories(prev =>
      prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]
    );
  };

  const canStart = selectedCategories.length > 0 && numPlayers >= 2;

  return (
    <div style={{ minHeight: "100vh", background: "#0f0f0f", color: "#f0f0f0", fontFamily: "'Playfair Display', serif", padding: "32px 16px" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap');
        * { box-sizing: border-box; }
        input[type=range] { accent-color: #FFD700; }
        ::selection { background: #FFD700; color: #000; }
      `}</style>

      <div style={{ maxWidth: 760, margin: "0 auto" }}>
        <div style={{ textAlign: "center", marginBottom: 48 }}>
          <div style={{ fontSize: 56, marginBottom: 8 }}>🎲</div>
          <h1 style={{ fontSize: 52, fontWeight: 900, margin: 0, letterSpacing: -1, color: "#FFD700", textShadow: "0 0 40px rgba(255,215,0,0.3)" }}>
            TRIVIAL
          </h1>
          <h1 style={{ fontSize: 52, fontWeight: 900, margin: 0, letterSpacing: -1, color: "#fff" }}>
            CABIN
          </h1>
          <p style={{ fontFamily: "'DM Sans', sans-serif", color: "#777", marginTop: 8, fontSize: 15, letterSpacing: 2, textTransform: "uppercase" }}>
            Trivia Night for Your Crew
          </p>
        </div>

        <Section title="Choose Categories">
          <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
            {PRESET_CATEGORIES.map(cat => {
              const active = selectedCategories.includes(cat.id);
              return (
                <button key={cat.id} onClick={() => toggleCategory(cat.id)} style={{
                  padding: "8px 18px", borderRadius: 30, border: `2px solid ${active ? CATEGORY_COLORS[cat.id] : "#333"}`,
                  background: active ? CATEGORY_COLORS[cat.id] + "22" : "transparent",
                  color: active ? "#fff" : "#777", cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                  fontSize: 14, transition: "all 0.2s", fontWeight: active ? 600 : 400
                }}>
                  {cat.emoji} {cat.label}
                </button>
              );
            })}
          </div>
        </Section>

        <Section title="Year Range">
          <p style={{ fontFamily: "'DM Sans'", color: "#aaa", fontSize: 14, marginBottom: 16 }}>
            Limit questions to events and culture from: <span style={{ color: "#FFD700", fontWeight: 600 }}>{yearFrom} - {yearTo}</span>
          </p>
          <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
            <RangeInput label="From" value={yearFrom} min={1900} max={yearTo - 1} onChange={v => setYearFrom(Number(v))} />
            <RangeInput label="To" value={yearTo} min={yearFrom + 1} max={2025} onChange={v => setYearTo(Number(v))} />
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 16 }}>
            {[["All Time", 1900, 2025], ["70s-80s", 1970, 1989], ["90s-00s", 1990, 2009], ["Modern (2010+)", 2010, 2025]].map(([label, f, t]) => (
              <button key={label} onClick={() => { setYearFrom(f); setYearTo(t); }} style={{
                padding: "6px 14px", borderRadius: 20, border: "1px solid #444", background: "transparent",
                color: "#aaa", cursor: "pointer", fontFamily: "'DM Sans'", fontSize: 13
              }}>{label}</button>
            ))}
          </div>
        </Section>

        <Section title="Players">
          <div style={{ display: "flex", gap: 12, marginBottom: 20, alignItems: "center" }}>
            <span style={{ fontFamily: "'DM Sans'", color: "#aaa", fontSize: 14 }}>Number of players:</span>
            {[2, 3, 4].map(n => (
              <button key={n} onClick={() => setNumPlayers(n)} style={{
                width: 40, height: 40, borderRadius: "50%", border: `2px solid ${numPlayers === n ? "#FFD700" : "#333"}`,
                background: numPlayers === n ? "#FFD70022" : "transparent", color: numPlayers === n ? "#FFD700" : "#777",
                cursor: "pointer", fontFamily: "'DM Sans'", fontWeight: 700, fontSize: 16
              }}>{n}</button>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {Array.from({ length: numPlayers }).map((_, i) => (
              <input key={i} value={playerNames[i]} onChange={e => {
                const names = [...playerNames];
                names[i] = e.target.value;
                setPlayerNames(names);
              }} placeholder={`Player ${i + 1} name`} style={{
                background: "#1a1a1a", border: "2px solid #333", borderRadius: 8,
                padding: "10px 14px", color: "#fff", fontFamily: "'DM Sans'", fontSize: 14, outline: "none"
              }} />
            ))}
          </div>
        </Section>

        <Section title="Questions Per Turn">
          <div style={{ display: "flex", gap: 10 }}>
            {[1, 2, 3].map(n => (
              <button key={n} onClick={() => setQuestionsPerTurn(n)} style={{
                flex: 1, padding: "12px", borderRadius: 10, border: `2px solid ${questionsPerTurn === n ? "#FFD700" : "#333"}`,
                background: questionsPerTurn === n ? "#FFD70022" : "transparent",
                color: questionsPerTurn === n ? "#FFD700" : "#777",
                cursor: "pointer", fontFamily: "'DM Sans'", fontWeight: 600, fontSize: 15
              }}>{n} {n === 1 ? "question" : "questions"}</button>
            ))}
          </div>
        </Section>

        <button disabled={!canStart} onClick={() => onStart({
          categories: selectedCategories,
          yearFrom, yearTo,
          players: playerNames.slice(0, numPlayers),
          questionsPerTurn
        })} style={{
          width: "100%", padding: "18px", marginTop: 8, borderRadius: 14,
          background: canStart ? "#FFD700" : "#333", color: canStart ? "#000" : "#555",
          border: "none", cursor: canStart ? "pointer" : "not-allowed",
          fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 900,
          letterSpacing: 1, transition: "all 0.2s",
          boxShadow: canStart ? "0 4px 30px rgba(255,215,0,0.3)" : "none"
        }}>
          {canStart ? "🎲 Start Game" : "Select at least 1 category"}
        </button>
      </div>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ marginBottom: 32, background: "#161616", borderRadius: 16, padding: 24, border: "1px solid #222" }}>
      <h3 style={{ margin: "0 0 16px", fontFamily: "'Playfair Display'", fontSize: 20, color: "#FFD700", letterSpacing: 0.5 }}>
        {title}
      </h3>
      {children}
    </div>
  );
}

function RangeInput({ label, value, min, max, onChange }) {
  return (
    <div style={{ flex: 1, minWidth: 180 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'DM Sans'", fontSize: 13, color: "#aaa", marginBottom: 6 }}>
        <span>{label}</span><span style={{ color: "#FFD700", fontWeight: 600 }}>{value}</span>
      </div>
      <input type="range" min={min} max={max} value={value} onChange={e => onChange(e.target.value)}
        style={{ width: "100%" }} />
    </div>
  );
}

function GameScreen({ config, onEnd }) {
  const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
  const [scores, setScores] = useState(Object.fromEntries(config.players.map(p => [p, 0])));
  const [phase, setPhase] = useState("roll");
  const [questions, setQuestions] = useState([]);
  const [currentQIdx, setCurrentQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [usedKeys, setUsedKeys] = useState(new Set());

  const currentPlayer = config.players[currentPlayerIdx];
  const currentQ = questions[currentQIdx];

  const startTurn = () => {
    const cats = config.categories;
    const picked = Array.from({ length: config.questionsPerTurn }, () =>
      cats[Math.floor(Math.random() * cats.length)]
    );
    const qs = picked.map(c => {
      let q;
      let attempts = 0;
      do {
        q = getQuestion(c, config.yearFrom, config.yearTo);
        attempts++;
      } while (usedKeys.has(q.question) && attempts < 20);
      setUsedKeys(prev => new Set([...prev, q.question]));
      return q;
    });
    setQuestions(qs);
    setCurrentQIdx(0);
    setSelected(null);
    setPhase("question");
  };

  const handleAnswer = (option) => {
    if (selected) return;
    setSelected(option);
    if (option === currentQ.answer) {
      setScores(prev => ({ ...prev, [currentPlayer]: (prev[currentPlayer] || 0) + 1 }));
    }
  };

  const handleNext = () => {
    if (currentQIdx + 1 < questions.length) {
      setCurrentQIdx(i => i + 1);
      setSelected(null);
    } else {
      setCurrentPlayerIdx(i => (i + 1) % config.players.length);
      setPhase("between");
      setQuestions([]);
    }
  };

  return (
    <div style={{ minHeight: "100vh", background: "#0f0f0f", color: "#f0f0f0", fontFamily: "'Playfair Display', serif", padding: "24px 16px" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap'); * { box-sizing: border-box; } ::selection { background: #FFD700; color: #000; }`}</style>

      <div style={{ maxWidth: 680, margin: "0 auto" }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 28, flexWrap: "wrap" }}>
          {config.players.map((p, i) => (
            <div key={p} style={{
              flex: 1, minWidth: 100, background: i === currentPlayerIdx ? "#FFD70015" : "#161616",
              border: `2px solid ${i === currentPlayerIdx ? "#FFD700" : "#222"}`,
              borderRadius: 12, padding: "12px 16px", textAlign: "center"
            }}>
              <div style={{ fontFamily: "'DM Sans'", fontSize: 12, color: i === currentPlayerIdx ? "#FFD700" : "#666", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>
                {i === currentPlayerIdx ? "▶ " : ""}{p}
              </div>
              <div style={{ fontSize: 28, fontWeight: 900, color: i === currentPlayerIdx ? "#FFD700" : "#fff" }}>
                {scores[p] || 0}
              </div>
            </div>
          ))}
        </div>

        {phase === "roll" && (
          <div style={{ textAlign: "center", padding: "48px 24px", background: "#161616", borderRadius: 20, border: "1px solid #222" }}>
            <div style={{ fontSize: 48, marginBottom: 16 }}>🎲</div>
            <h2 style={{ fontSize: 28, fontWeight: 900, margin: "0 0 8px", color: "#fff" }}>{currentPlayer}'s Turn</h2>
            <p style={{ fontFamily: "'DM Sans'", color: "#777", marginBottom: 32 }}>
              {config.questionsPerTurn} question{config.questionsPerTurn > 1 ? "s" : ""} from random categories
            </p>
            <button onClick={startTurn} style={{
              padding: "16px 40px", background: "#FFD700", color: "#000", border: "none",
              borderRadius: 12, cursor: "pointer", fontFamily: "'Playfair Display'",
              fontSize: 20, fontWeight: 900, boxShadow: "0 4px 24px rgba(255,215,0,0.3)"
            }}>Roll for Category</button>
          </div>
        )}

        {phase === "between" && (
          <div style={{ textAlign: "center", padding: "40px 24px", background: "#161616", borderRadius: 20, border: "1px solid #222" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
            <h2 style={{ fontSize: 24, fontWeight: 900, margin: "0 0 8px" }}>Turn Complete!</h2>
            <p style={{ fontFamily: "'DM Sans'", color: "#aaa", marginBottom: 28 }}>
              Up next: <span style={{ color: "#FFD700" }}>{config.players[currentPlayerIdx]}</span>
            </p>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <button onClick={() => setPhase("roll")} style={{
                padding: "14px 32px", background: "#FFD700", color: "#000", border: "none",
                borderRadius: 12, cursor: "pointer", fontFamily: "'Playfair Display'", fontSize: 18, fontWeight: 900
              }}>Continue</button>
              <button onClick={() => onEnd(scores)} style={{
                padding: "14px 24px", background: "transparent", color: "#777", border: "1px solid #333",
                borderRadius: 12, cursor: "pointer", fontFamily: "'DM Sans'", fontSize: 15
              }}>End Game</button>
            </div>
          </div>
        )}

        {phase === "question" && currentQ && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{
                display: "inline-block", padding: "4px 14px", borderRadius: 20,
                background: (CATEGORY_COLORS[currentQ.category] || "#555") + "33",
                border: `1px solid ${CATEGORY_COLORS[currentQ.category] || "#555"}`,
                color: "#fff", fontFamily: "'DM Sans'", fontSize: 13
              }}>
                {currentQ.categoryLabel}
              </div>
              <div style={{ fontFamily: "'DM Sans'", color: "#666", fontSize: 13 }}>
                Q{currentQIdx + 1} of {questions.length}
              </div>
            </div>

            <div style={{ background: "#161616", borderRadius: 18, padding: "28px 24px", marginBottom: 20, border: "1px solid #222" }}>
              <h2 style={{ fontSize: 22, fontWeight: 700, lineHeight: 1.45, margin: 0, color: "#fff" }}>
                {currentQ.question}
              </h2>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {currentQ.options.map((opt, i) => {
                const isSelected = selected === opt;
                const isCorrect = opt === currentQ.answer;
                let bg = "#161616", border = "#2a2a2a", color = "#ddd";

                if (selected) {
                  if (isCorrect) { bg = "#27AE6022"; border = "#27AE60"; color = "#2ecc71"; }
                  else if (isSelected) { bg = "#C0392B22"; border = "#C0392B"; color = "#e74c3c"; }
                  else { color = "#555"; }
                }

                return (
                  <button key={i} onClick={() => handleAnswer(opt)} style={{
                    padding: "14px 20px", background: bg, border: `2px solid ${border}`,
                    borderRadius: 12, color, cursor: selected ? "default" : "pointer",
                    fontFamily: "'DM Sans'", fontSize: 16, textAlign: "left",
                    transition: "all 0.2s", fontWeight: isCorrect && selected ? 700 : 400
                  }}>
                    {opt}
                  </button>
                );
              })}
            </div>

            {selected && (
              <div style={{ marginTop: 20, background: "#161616", borderRadius: 14, padding: "18px 20px", border: `1px solid ${selected === currentQ.answer ? "#27AE60" : "#C0392B"}` }}>
                <p style={{ fontFamily: "'DM Sans'", fontSize: 14, color: "#bbb", margin: "0 0 16px", lineHeight: 1.6 }}>
                  💡 {currentQ.explanation}
                </p>
                <button onClick={handleNext} style={{
                  width: "100%", padding: "13px", background: "#FFD700", color: "#000",
                  border: "none", borderRadius: 10, cursor: "pointer",
                  fontFamily: "'Playfair Display'", fontSize: 17, fontWeight: 900
                }}>
                  {currentQIdx + 1 < questions.length ? "Next Question →" : "End Turn →"}
                </button>
              </div>
            )}
          </div>
        )}

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 32, paddingTop: 20, borderTop: "1px solid #222" }}>
          <span style={{ fontFamily: "'DM Sans'", fontSize: 13, color: "#555" }}>
            {config.categories.length} categories · {config.yearFrom}-{config.yearTo}
          </span>
          <button onClick={() => onEnd(scores)} style={{
            padding: "6px 14px", background: "transparent", color: "#555",
            border: "1px solid #2a2a2a", borderRadius: 8, cursor: "pointer",
            fontFamily: "'DM Sans'", fontSize: 13
          }}>⚙ New Game</button>
        </div>
      </div>
    </div>
  );
}

function EndScreen({ scores, players, onRestart }) {
  const sorted = [...players].sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
  const winner = sorted[0];

  return (
    <div style={{ minHeight: "100vh", background: "#0f0f0f", color: "#f0f0f0", fontFamily: "'Playfair Display', serif", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap'); * { box-sizing: border-box; }`}</style>
      <div style={{ maxWidth: 480, width: "100%", textAlign: "center" }}>
        <div style={{ fontSize: 72, marginBottom: 8 }}>🏆</div>
        <h1 style={{ fontSize: 40, fontWeight: 900, color: "#FFD700", margin: "0 0 4px" }}>{winner}</h1>
        <p style={{ fontFamily: "'DM Sans'", color: "#aaa", marginBottom: 40 }}>Wins with {scores[winner] || 0} points!</p>
        <div style={{ background: "#161616", borderRadius: 16, padding: 24, marginBottom: 32, border: "1px solid #222" }}>
          {sorted.map((p, i) => (
            <div key={p} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderBottom: i < sorted.length - 1 ? "1px solid #222" : "none" }}>
              <span style={{ fontFamily: "'DM Sans'", color: i === 0 ? "#FFD700" : "#aaa" }}>
                {["🥇", "🥈", "🥉"][i] || "  "} {p}
              </span>
              <span style={{ fontWeight: 700, color: i === 0 ? "#FFD700" : "#fff", fontSize: 20 }}>{scores[p] || 0}</span>
            </div>
          ))}
        </div>
        <button onClick={onRestart} style={{
          padding: "16px 40px", background: "#FFD700", color: "#000", border: "none",
          borderRadius: 12, cursor: "pointer", fontFamily: "'Playfair Display'",
          fontSize: 20, fontWeight: 900, boxShadow: "0 4px 24px rgba(255,215,0,0.3)"
        }}>Play Again</button>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("setup");
  const [gameConfig, setGameConfig] = useState(null);
  const [finalScores, setFinalScores] = useState(null);

  if (screen === "setup") return <SetupScreen onStart={(config) => { setGameConfig(config); setScreen("game"); }} />;
  if (screen === "game") return <GameScreen config={gameConfig} onEnd={(scores) => { setFinalScores(scores); setScreen("end"); }} />;
  if (screen === "end") return <EndScreen scores={finalScores || {}} players={gameConfig?.players || []} onRestart={() => { setGameConfig(null); setScreen("setup"); }} />;
}

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
